<!DOCTYPE html>
<html>
<head>
    <title>Smart Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">💰 Smart Expense Tracker</h1>

    <div class="text-center mb-3">
        <a href="/add/" class="btn btn-primary">Add Expense</a>
        <a href="/download/" class="btn btn-success">Download Report</a>
    </div>

    <h3>Your Expenses</h3>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
        {% for expense in expenses %}
        <tr>
            <td>{{ expense.description }}</td>
            <td>{{ expense.category }}</td>
            <td>₹{{ expense.amount }}</td>
            <td>{{ expense.date }}</td>
            <td>
                <a href="/edit/{{ expense.id }}/" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ expense.id }}/" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <h3 class="text-center mt-5">Expense Chart</h3>

    <div style="width: 500px; height: 500px; margin: auto;">
        <canvas id="expenseChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = {{ labels|safe }};
    const data = {{ values|safe }};

    const ctx = document.getElementById('expenseChart').getContext('2d');

    const expenseChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                label: 'Expenses',
                data: data
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>

</body>
</html>
